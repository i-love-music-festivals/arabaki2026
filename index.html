  <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABAKI ROCK FEST.26 非公式タイムテーブル</title>
    
    <meta property="og:title" content="ARABAKI ROCK FEST.26 非公式タイムテーブル">
    <meta property="og:description" content="ARABAKI ROCK FEST.26のタイムテーブル、フード、エリアマップを確認できる非公式ガイドです。">
    <meta property="og:url" content="https://i-love-music-festivals.github.io/arabaki-2026/">
    <meta property="og:image" content="https://i-love-music-festivals.github.io/arabaki-2026/arabaki2026.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ARABAKI ROCK FEST.26 非公式ガイド">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i-love-music-festivals.github.io/arabaki-2026/arabaki2026.png">

    <link rel="stylesheet" href="./style.css">
</head>
    
<body>
    <div id="digitalClock">00:00:00</div>
    
    <div class="app-container">
        <header>
            <h1>ARABAKI ROCK FEST.26<br>非公式タイムテーブル</h1>
            <div class="disclaimer">※各アーティストのジャンルはAIによる判定です。</div>
            <div id="lastUpdated">Last Update: --/--/-- --:--</div> 
            
            <div class="tabs">
                <button class="tab-btn" id="btnDay1" onclick="switchTab('day1')">4/25 (土)</button>
                <button class="tab-btn" id="btnDay2" onclick="switchTab('day2')">4/26 (日)</button>
                <button class="tab-btn" id="btnFood" onclick="switchTab('food')">フード</button>
                <button class="tab-btn" id="btnMap" onclick="switchTab('map')">エリアマップ</button>
            </div>
        </header>

        <div id="timetableSection" class="content-section">
            <div class="scroll-container">
                <div class="stage-headers-wrapper" id="headerWrapper">
                    <div class="stage-header-empty"></div>
                    <div class="stage-header-list" id="stageHeaders"></div>
                </div>
                <div class="timetable-wrapper" id="ttWrapper" onscroll="syncScroll()">
                    <div class="time-col" id="timeCol"></div>
                    <div style="display: flex; position: relative;" id="gridContainer">
                        <div class="current-time-line" id="currentTimeLine"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="foodSection" class="content-section">
            <h2 class="food-section-header">フードエリア一覧</h2>
            <div id="foodContainer"></div>
        </div>

        <div id="mapSection" class="content-section">
            <div class="map-wrapper" id="mapWrapper">
                <img class="area-map-img" src="https://arabaki.com/share/img/area/hsyrahrus/dl/arabaki26_areamap_ver02.jpg" alt="ARABAKI Area Map">
                <img class="area-map-img" src="https://arabaki.com/share/img/area/tentarea_26_dl.jpg?20260413" alt="ARABAKI Tent Area Map">
            </div>
            <div class="map-controls">
                <button class="zoom-btn" onclick="zoomMap(0.2)">＋</button>
                <button class="zoom-btn" onclick="zoomMap(-0.2)">－</button>
                <button class="zoom-btn" onclick="resetZoom()" style="font-size: 12px;">Reset</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
